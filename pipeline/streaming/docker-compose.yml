services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: sgprimary-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT_HOST://localhost:9092,PLAINTEXT://sgprimary-kafka:19092"
      KAFKA_LISTENERS: "CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@sgprimary-kafka:29093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      CLUSTER_ID: "sGPrimary-Kafka-ClusterId01"
    volumes:
      - kafka-data:/var/lib/kafka/data

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: sgprimary-kafka-init
    depends_on:
      - kafka
    command:
      - /bin/bash
      - -c
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server sgprimary-kafka:19092 --list >/dev/null 2>&1; do
          echo "Waiting for Kafka..."
          sleep 2
        done
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server sgprimary-kafka:19092 \
          --create \
          --if-not-exists \
          --topic p1_vacancy_snapshots \
          --partitions 1 \
          --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server sgprimary-kafka:19092 \
          --describe \
          --topic p1_vacancy_snapshots
    restart: "no"

volumes:
  kafka-data:
