services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    container_name: sgprimary-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../../ml/mlruns:/mlflow/mlruns
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlruns/mlflow.db
      --artifacts-destination /mlflow/mlruns/artifacts
      --serve-artifacts
    restart: unless-stopped
